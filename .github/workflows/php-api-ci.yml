name: Kontrola kódu PHP API

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test + Lint + Static Analysis
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: consumption_tracker
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Nastavení PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: redis, zip, pdo_mysql, mbstring, intl
          coverage: none
          tools: composer:v2

      - name: Validace composer.json a composer.lock
        working-directory: src/api
        # bez --strict zamerne - "version" pole je nutne (ctu ho CI pro
        # baked APP_VERSION v Docker image), takze tohle upozorneni
        # nemuzeme splnit a nechceme kvuli nemu shazovat cely pipeline
        run: composer validate

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: src/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('src/api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Instalace závislostí
        working-directory: src/api
        run: composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader

      - name: Kontrola bezpečnosti balíčků
        working-directory: src/api
        run: composer audit

      - name: Spuštění PHPStan (Static Analysis)
        working-directory: src/api
        run: vendor/bin/phpstan analyse app --no-progress

      - name: Spuštění testů
        working-directory: src/api
        run: composer test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: consumption_tracker
          DB_USER: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  docker-build-check:
    name: Docker Build Test
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Zjištění verze z composer.json
        id: version
        run: echo "app_version=$(jq -r .version src/api/composer.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test build produkčního image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.prod
          push: false
          load: true
          tags: consumption-api:test
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image na zranitelnosti (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: consumption-api:test
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  build-and-push:
    name: Build & Push Image
    needs: test
    # jen push do develop (dev deploy) nebo vytvoreni verzoveho tagu (prod
    # deploy) - obycejny push/merge do main bez tagu nema nic spoustet
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Určení cílového prostředí a tagu image
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          echo "image=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "app_version=$(jq -r .version src/api/composer.json)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (lokálně, pro scan před pushem)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.prod
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image na zranitelnosti (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Push image do GHCR
        run: docker push ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}

      - name: Aktualizovat image tag v gitops repu (dev)
        if: steps.meta.outputs.environment == 'dev'
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_REPO_TOKEN }}@github.com/jr-consumption-tracker/consumption-gitops.git gitops
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|newTag: .*|newTag: ${{ steps.meta.outputs.image_tag }}|" apps/api/overlays/dev/kustomization.yaml
          if git diff --quiet; then
            echo "Tag se nezmenil, nic k commitnuti."
            exit 0
          fi
          git add apps/api/overlays/dev/kustomization.yaml
          git commit -m "Deploy api ${{ steps.meta.outputs.image_tag }} to dev"
          git push

      # Az bude existovat apps/api/overlays/prod, pridame stejny krok
      # podmineny na steps.meta.outputs.environment == 'prod'.
